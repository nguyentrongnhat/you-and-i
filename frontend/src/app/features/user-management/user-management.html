<p-table [value]="users()" [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '25rem' }" [rowsPerPageOptions]="[5, 10, 20]">
        <ng-template #header>
            <tr>
                <th>username</th>
                @if(!this.platformService.isSmallMobileDevice()) {
                    <th>verified</th>
                }
                <th>enabled</th>
            </tr>
        </ng-template>
        <ng-template #body let-user>
            <tr class="cursor-pointer" (click)="displayUserDetailDialog()">
                <td>{{ user.username }}</td>
                @if(!this.platformService.isSmallMobileDevice()) {
                    <td>{{ user.emailVerified }}</td>
                }
                <td>{{ user.enabled }}</td>
            </tr>
        </ng-template>
    </p-table>
