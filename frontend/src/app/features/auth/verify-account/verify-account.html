<div class="container" animate.enter="enter-animation">
    <div class="logo-and-name">
        <img class="logo-image" src="images/jarofmessages.png" alt="Jar of Messages logo">
        <h1>Jar of Messages</h1> 
    </div>

    @if(!this.isRequested()) {
        <form pFocusTrap class="form" (ngSubmit)="onSubmit()">
            <p-iconfield>
                <p-inputicon>
                    <i class="pi pi-envelope"> </i>
                </p-inputicon>
                <input 
                    pInputText 
                    type="email" 
                    placeholder="Email" 
                    [fluid]="true" 
                    [formField]="signupForm.username" />
            </p-iconfield>

            <p-button 
                type="submit"
                label="Get verify code" 
                [style]="{'width': '100%'}"
                [severity]="submitButtonSeverity()"
                [disabled]="signupForm().invalid()"/>
        </form>
    }
    @else {
        <form pFocusTrap class="form" (ngSubmit)="onSubmit()" animate.enter="enter-animation">
            <p-inputotp size="large" [length]="6" [style]="{'margin': 'auto'}" required="true" [integerOnly]="true" />

            <div class="action-buttons" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <p-button 
                    label="Resend Code" 
                    [style]="{'width': '100%'}"
                    severity="success"
                    [disabled]="signupForm().invalid()"/>
    
                <p-button 
                    label="Verify" 
                    [style]="{'width': '100%'}"
                    [severity]="submitButtonSeverity()"
                    [disabled]="signupForm().invalid()"/>
            
            </div>
        </form>
    }
</div>
