<div class="card">
    <p-table [value]="gameHistories()" [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '25rem' }" [rowsPerPageOptions]="[5, 10, 20]">
        <ng-template #header>
            <tr>
                <th style="width:50%">Date</th>
                <th style="width:50%">Time to Finish</th>
    
            </tr>
        </ng-template>
        <ng-template #body let-history>
            <tr>
                <td>{{ history.startTime | date:'dd/MM/yyyy - hh:mm:ss a' }}</td>
                <td>{{ convertTimerToTimeDisplay(history.timeToFinish) }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
